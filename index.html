<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTransporter - Pelanggan (Versi Stabil)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .card { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #map { height: 350px; width: 100%; border-radius: 10px; margin: 10px 0; border: 2px solid #ddd; z-index: 1; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .readonly-input { background: #f9f9f9; color: #555; cursor: not-allowed; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 16px; text-decoration: none; display: inline-block; text-align: center; box-sizing: border-box; }
        .btn-gps { background: #3498db; color: white; }
        .btn-order { background: #27ae60; color: white; }
        .btn-wa { background: #25D366; color: white; }
        .btn-confirm { background: #1a73e8; color: white; }
        .status-box { padding: 15px; border-radius: 10px; text-align: center; margin-top: 10px; font-weight: bold; border: 1px solid #ffeeba; background: #fff3cd; color: #856404; }
        .pay-now { background: #ffffff; border: 2px solid #28a745; margin-top: 15px; padding: 15px; border-radius: 10px; }
        .hidden { display: none !important; }
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center;">🚗 MyTransporter</h2>
    
    <div id="bookingForm">
        <input type="text" id="custName" placeholder="Nama Anda">
        <input type="tel" id="custPhone" placeholder="No. Telefon">
        <button class="btn btn-gps" onclick="getLocation()">📍 Kesan Lokasi Jemput Saya</button>
        <div id="map"></div>
        <input type="text" id="pickupLoc" placeholder="Lokasi jemput..." readonly class="readonly-input">
        <input type="text" id="dropoffLoc" placeholder="Lokasi destinasi..." readonly class="readonly-input">
        <h3 id="fareText" style="text-align:center; color:#27ae60;">RM 0.00</h3>
        <button class="btn btn-order" onclick="submitBooking()">Tempah & Tunggu Pemandu</button>
    </div>

    <div id="statusArea" class="hidden">
        <div id="statusMsg" class="status-box">Sedang mencari pemandu...</div>
        <div id="paymentArea" class="pay-now hidden">
            <h3 style="margin:0">Pemandu Sahkan! ✅</h3>
            <p>Sila bayar <b>RM <span id="finalFare">0.00</span></b> ke:</p>
            <p><b>MAYBANK: 162263547890</b> (Ahmad Transport)</p>
            <a id="waLink" href="#" target="_blank" class="btn btn-wa">📲 Hantar Resit ke WhatsApp</a>
            <button class="btn btn-confirm" onclick="uploadedReceipt()">Saya Sudah Bayar</button>
        </div>
        <button class="btn" style="background:#eee; color:#333; font-size:12px;" onclick="resetApp()">Tempah Baru (Batal)</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA9vK7iI1awExMkWxMFLtNDVlM4d1EM26o",
        authDomain: "mytransporter-687d9.firebaseapp.com",
        databaseURL: "https://mytransporter-687d9-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "mytransporter-687d9",
        appId: "1:495656207465:web:4d603fe3c77abadfe0cef8"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Inisialisasi Data
    let currentOrderId = localStorage.getItem('lastOrderId');
    let pickupCoords, dropoffCoords, routingControl, driverMarker;
    let finalPrice = 0;

    var map = L.map('map').setView([3.139, 101.686], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    var carIcon = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/854/854838.png',
        iconSize: [30, 30], iconAnchor: [15, 15]
    });

    // Check jika ada order aktif semasa load page
    if (currentOrderId) {
        document.getElementById('bookingForm').classList.add('hidden');
        document.getElementById('statusArea').classList.remove('hidden');
        listenToStatus();
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                pickupCoords = L.latLng(pos.coords.latitude, pos.coords.longitude);
                map.setView(pickupCoords, 16);
                getAddress(pickupCoords.lat, pickupCoords.lng, 'pickupLoc');
                updateRoute();
            }, () => alert("Sila benarkan GPS!"));
        }
    }

    map.on('click', e => { 
        dropoffCoords = e.latlng; 
        getAddress(dropoffCoords.lat, dropoffCoords.lng, 'dropoffLoc');
        updateRoute(); 
    });

    async function getAddress(lat, lon, fieldId) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
            const data = await response.json();
            document.getElementById(fieldId).value = (data.display_name || "Lokasi dikesan").substring(0, 50) + "...";
        } catch (e) { document.getElementById(fieldId).value = lat.toFixed(4) + "," + lon.toFixed(4); }
    }

    function updateRoute() {
        if (!pickupCoords || !dropoffCoords) return;
        if (routingControl) map.removeControl(routingControl);
        routingControl = L.Routing.control({
            waypoints: [pickupCoords, dropoffCoords],
            show: false, addWaypoints: false
        }).on('routesfound', e => {
            let dist = e.routes[0].summary.totalDistance / 1000;
            finalPrice = Math.max(10, dist * 2);
            document.getElementById('fareText').innerText = "RM " + finalPrice.toFixed(2);
        }).addTo(map);
    }

    // FUNGSI SUBMIT (FIXED)
    function submitBooking() {
        const name = document.getElementById('custName').value;
        if(!name || !pickupCoords || !dropoffCoords) return alert("Lengkapkan nama & lokasi!");

        const newRef = database.ref('pesanan').push();
        currentOrderId = newRef.key;
        localStorage.setItem('lastOrderId', currentOrderId);

        newRef.set({
            nama: name, 
            phone: document.getElementById('custPhone').value,
            pickup: document.getElementById('pickupLoc').value, 
            dropoff: document.getElementById('dropoffLoc').value,
            harga: finalPrice.toFixed(2), 
            status: "Menunggu Sahkan",
            masa: new Date().toLocaleString()
        }).then(() => {
            document.getElementById('bookingForm').classList.add('hidden');
            document.getElementById('statusArea').classList.remove('hidden');
            listenToStatus();
        }).catch(err => alert("Ralat: " + err.message));
    }

    // FUNGSI UPLOAD RESIT (FIXED)
    function uploadedReceipt() {
        if (!currentOrderId) return alert("ID Pesanan hilang. Sila tempah semula.");
        
        database.ref('pesanan/' + currentOrderId).update({ status: "Semak Resit" })
        .then(() => alert("Notifikasi dihantar! Pemandu akan semak bayaran anda."))
        .catch(err => alert("Gagal kemaskini: " + err.message));
    }

    function listenToStatus() {
        if (!currentOrderId) return;
        database.ref('pesanan/' + currentOrderId).on('value', snap => {
            const data = snap.val();
            if(!data) return;

            if(data.driver_lat && data.driver_lon) {
                let pos = [data.driver_lat, data.driver_lon];
                if(!driverMarker) driverMarker = L.marker(pos, {icon: carIcon}).addTo(map);
                else driverMarker.setLatLng(pos);
            }

            if(data.status === "Sila Bayar") {
                document.getElementById('paymentArea').classList.remove('hidden');
                document.getElementById('finalFare').innerText = data.harga;
                document.getElementById('waLink').href = `https://wa.me/60148495947?text=Resit RM${data.harga} dari ${data.nama}`;
            } else if(data.status === "Semak Resit") {
                document.getElementById('paymentArea').classList.add('hidden');
                document.getElementById('statusMsg').innerText = "Menunggu pemandu sahkan resit anda...";
            } else if(data.status === "Sedang Berjalan") {
                document.getElementById('statusMsg').innerText = "Bayaran Sah! Pemandu sedang ke lokasi anda.";
                document.getElementById('statusMsg').style.background = "#27ae60";
                document.getElementById('statusMsg').style.color = "white";
            } else if(data.status === "Selesai") {
                resetApp();
                alert("Perjalanan Selesai. Terima kasih!");
            }
        });
    }

    function resetApp() {
        localStorage.removeItem('lastOrderId');
        location.reload();
    }
</script>
</body>
</html>
