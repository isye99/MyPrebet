<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTransporter - Pelanggan</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 15px; }
        .card { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #map { height: 250px; border-radius: 10px; margin: 10px 0; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-order { background: #27ae60; color: white; }
        .status-box { padding: 15px; border-radius: 10px; text-align: center; margin-top: 10px; font-weight: bold; }
        .waiting { background: #fff3cd; color: #856404; }
        .pay-now { background: #d4edda; color: #155724; border: 2px solid #28a745; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <h2>🚗 MyTransporter</h2>
    <div id="bookingForm">
        <input type="text" id="custName" placeholder="Nama Anda">
        <input type="tel" id="custPhone" placeholder="No. Telefon">
        <div id="map"></div>
        <input type="text" id="pickupLoc" placeholder="Lokasi jemput..." readonly>
        <input type="text" id="dropoffLoc" placeholder="Klik peta untuk destinasi..." readonly>
        <button class="btn btn-order" onclick="submitBooking()">Tempah & Tunggu Pemandu</button>
    </div>

    <div id="statusArea" class="hidden">
        <div id="statusMsg" class="status-box waiting">Menunggu pemandu mengesahkan pesanan anda...</div>
        
        <div id="paymentArea" class="pay-now hidden" style="margin-top:15px; padding:15px;">
            <h3>Pemandu Sedia! ✅</h3>
            <p>Sila buat bayaran RM <span id="fare">0.00</span> ke:</p>
            <p><b>MAYBANK: 162263547890</b><br>Ahmad Transport</p>
            <hr>
            <p>Selepas bayar, klik butang di bawah:</p>
            <button class="btn" style="background:#1a73e8; color:white;" onclick="uploadedReceipt()">Saya Sudah Bayar & Upload</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyA9vK7iI1awExMkWxMFLtNDVlM4d1EM26o",
      authDomain: "mytransporter-687d9.firebaseapp.com",
      databaseURL: "https://mytransporter-687d9-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "mytransporter-687d9",
      appId: "1:495656207465:web:4d603fe3c77abadfe0cef8"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let pickup, dropoff, currentOrderId;

    // Setup Peta Simple
    var map = L.map('map').setView([3.139, 101.686], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    map.on('click', e => { 
        dropoff = e.latlng; 
        document.getElementById('dropoffLoc').value = e.latlng.lat.toFixed(4) + "," + e.latlng.lng.toFixed(4);
    });

    function submitBooking() {
        const name = document.getElementById('custName').value;
        if(!name || !dropoff) return alert("Isi nama & pilih destinasi!");

        const newRef = database.ref('pesanan').push();
        currentOrderId = newRef.key;
        
        newRef.set({
            nama: name,
            phone: document.getElementById('custPhone').value,
            pickup: "Lokasi GPS",
            dropoff: document.getElementById('dropoffLoc').value,
            status: "Menunggu Sahkan",
            harga: "15.00" // Contoh harga tetap
        });

        document.getElementById('bookingForm').classList.add('hidden');
        document.getElementById('statusArea').classList.remove('hidden');
        listenToStatus();
    }

    function listenToStatus() {
        database.ref('pesanan/' + currentOrderId).on('value', snapshot => {
            const data = snapshot.val();
            if(!data) return;

            if(data.status === "Sila Bayar") {
                document.getElementById('statusMsg').innerText = "Pemandu berminat! Sila buat bayaran segera.";
                document.getElementById('paymentArea').classList.remove('hidden');
                document.getElementById('fare').innerText = data.harga;
            } else if(data.status === "Semak Resit") {
                document.getElementById('paymentArea').classList.add('hidden');
                document.getElementById('statusMsg').innerText = "Resit dihantar. Menunggu pemandu sahkan duit masuk...";
            } else if(data.status === "Sedang Berjalan") {
                document.getElementById('statusMsg').style.background = "#27ae60";
                document.getElementById('statusMsg').style.color = "white";
                document.getElementById('statusMsg').innerText = "Bayaran Diterima! Pemandu dalam perjalanan ke lokasi anda.";
            }
        });
    }

    function uploadedReceipt() {
        database.ref('pesanan/' + currentOrderId).update({ status: "Semak Resit" });
    }
</script>
</body>
</html>
