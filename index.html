<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTransporter - Pelanggan</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .card { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        
        /* AUTH SCREEN */
        #authScreen { display: flex; flex-direction: column; gap: 10px; }
        .auth-toggle { text-align: center; font-size: 13px; color: #3498db; cursor: pointer; margin-top: 10px; }

        /* APP CONTENT */
        #appContent { display: none; }
        #map { height: 300px; width: 100%; border-radius: 10px; margin: 10px 0; border: 2px solid #ddd; z-index: 1; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .readonly-input { background: #f9f9f9; color: #555; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; text-align: center; box-sizing: border-box; width: 100%; }
        .btn-primary { background: #3498db; color: white; margin-top: 5px; }
        .btn-order { background: #27ae60; color: white; margin-top: 15px; padding: 15px; font-size: 16px; }
        .btn-wa { background: #25D366; color: white; }
        .btn-confirm { background: #1a73e8; color: white; }
        .btn-logout { background: #eee; color: #666; font-size: 11px; margin-top: 20px; }

        .price-display { background: #e8f0fe; padding: 10px; border-radius: 8px; text-align: center; margin: 10px 0; }
        .status-box { padding: 15px; border-radius: 10px; text-align: center; margin-top: 10px; font-weight: bold; font-size: 14px; background: #fff3cd; color: #856404; }
        .pay-now { background: #ffffff; border: 2px solid #28a745; margin-top: 15px; padding: 15px; border-radius: 10px; }
        .hidden { display: none !important; }
        .search-container { display: flex; gap: 5px; }
        .leaflet-routing-container { display: none !important; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚗 MyTransporter</h2>

    <div id="authScreen">
        <h3 id="authTitle" style="text-align:center;">Log Masuk</h3>
        <input type="email" id="authEmail" placeholder="Emel">
        <input type="password" id="authPass" placeholder="Kata Laluan">
        <button class="btn btn-primary" id="btnAuth" onclick="handleAuth()">Masuk</button>
        <p class="auth-toggle" onclick="toggleAuthMode()" id="toggleText">Belum ada akaun? Daftar di sini</p>
    </div>

    <div id="appContent">
        <p style="font-size: 12px; text-align: right; color: #888;" id="userDisplay"></p>
        
        <div id="map"></div>

        <div id="bookingForm">
            <button class="btn btn-primary" onclick="getLocation()" style="background:#34495e;">📍 Kesan Lokasi Jemput</button>
            <input type="text" id="pickupLoc" placeholder="Lokasi jemput..." readonly class="readonly-input">
            
            <div class="search-container">
                <input type="text" id="destSearch" placeholder="Cari destinasi...">
                <button class="btn btn-primary" style="width: 80px;" onclick="searchDestination()">Cari</button>
            </div>
            <input type="text" id="dropoffLoc" placeholder="Alamat destinasi..." readonly class="readonly-input">
            
            <div class="price-display">
                <h2 id="fareText" style="margin:0; color:#27ae60;">RM 0.00</h2>
            </div>
            <button class="btn btn-order" onclick="submitBooking()">Tempah Sekarang</button>
        </div>

        <div id="statusArea" class="hidden">
            <div id="statusMsg" class="status-box">Mencari pemandu...</div>
            <div id="paymentArea" class="pay-now hidden">
                <h3 style="margin:0; font-size:16px;">Pemandu Sahkan! ✅</h3>
                <p style="font-size:13px;">Sila bayar ke <b>MAYBANK 162263547890</b></p>
                <a id="waLink" href="#" target="_blank" class="btn btn-wa">📲 WhatsApp Resit</a>
                <button class="btn btn-confirm" style="margin-top:5px;" onclick="uploadedReceipt()">Saya Dah Bayar</button>
            </div>
        </div>

        <button class="btn btn-logout" onclick="logout()">Log Keluar</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA9vK7iI1awExMkWxMFLtNDVlM4d1EM26o",
        authDomain: "mytransporter-687d9.firebaseapp.com",
        databaseURL: "https://mytransporter-687d9-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "mytransporter-687d9",
        appId: "1:495656207465:web:4d603fe3c77abadfe0cef8"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const database = firebase.database();

    let isLoginMode = true;
    let currentUser = null;
    let currentOrderId = localStorage.getItem('lastOrderId');

    // --- SISTEM AUTH ---
    function toggleAuthMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').innerText = isLoginMode ? "Log Masuk" : "Daftar Akaun";
        document.getElementById('btnAuth').innerText = isLoginMode ? "Masuk" : "Daftar";
        document.getElementById('toggleText').innerText = isLoginMode ? "Belum ada akaun? Daftar di sini" : "Dah ada akaun? Log masuk";
    }

    function handleAuth() {
        const email = document.getElementById('authEmail').value;
        const pass = document.getElementById('authPass').value;
        if(!email || !pass) return alert("Isi emel dan password!");

        if(isLoginMode) {
            auth.signInWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        } else {
            auth.createUserWithEmailAndPassword(email, pass).catch(e => alert(e.message));
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            currentUser = user;
            document.getElementById('authScreen').classList.add('hidden');
            document.getElementById('appContent').style.display = 'block';
            document.getElementById('userDisplay').innerText = "Hi, " + user.email;
            initMap();
            if(currentOrderId) checkExistingOrder();
        } else {
            document.getElementById('authScreen').classList.remove('hidden');
            document.getElementById('appContent').style.display = 'none';
        }
    });

    function logout() {
        auth.signOut().then(() => location.reload());
    }

    // --- LOGIK MAP & BOOKING ---
    var map, pickupCoords, dropoffCoords, routingControl, pickupMarker, dropoffMarker, driverMarker;
    var finalPrice = 0;

    function initMap() {
        if(map) return;
        map = L.map('map').setView([3.139, 101.686], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        map.on('click', e => { 
            dropoffCoords = e.latlng; 
            if (dropoffMarker) map.removeLayer(dropoffMarker);
            dropoffMarker = L.marker(dropoffCoords).addTo(map);
            getAddress(e.latlng.lat, e.latlng.lng, 'dropoffLoc');
            updateRoute(); 
        });
    }

    function getLocation() {
        navigator.geolocation.getCurrentPosition(pos => {
            pickupCoords = L.latLng(pos.coords.latitude, pos.coords.longitude);
            map.setView(pickupCoords, 15);
            if (pickupMarker) map.removeLayer(pickupMarker);
            pickupMarker = L.marker(pickupCoords).addTo(map);
            getAddress(pos.coords.latitude, pos.coords.longitude, 'pickupLoc');
            updateRoute();
        });
    }

    async function searchDestination() {
        const q = document.getElementById('destSearch').value;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}, Malaysia`);
        const data = await res.json();
        if(data.length > 0) {
            dropoffCoords = L.latLng(data[0].lat, data[0].lon);
            map.setView(dropoffCoords, 15);
            if (dropoffMarker) map.removeLayer(dropoffMarker);
            dropoffMarker = L.marker(dropoffCoords).addTo(map);
            document.getElementById('dropoffLoc').value = data[0].display_name.substring(0,40);
            updateRoute();
        }
    }

    async function getAddress(lat, lon, id) {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
        const data = await res.json();
        document.getElementById(id).value = (data.display_name).substring(0,40);
    }

    function updateRoute() {
        if (!pickupCoords || !dropoffCoords) return;
        if (routingControl) map.removeControl(routingControl);
        routingControl = L.Routing.control({
            waypoints: [pickupCoords, dropoffCoords],
            show: false, createMarker: () => null
        }).on('routesfound', e => {
            let dist = e.routes[0].summary.totalDistance / 1000;
            finalPrice = Math.max(10, dist * 2);
            document.getElementById('fareText').innerText = "RM " + finalPrice.toFixed(2);
        }).addTo(map);
    }

    function submitBooking() {
        if(!pickupCoords || !dropoffCoords) return alert("Pilih lokasi!");
        const newRef = database.ref('pesanan').push();
        currentOrderId = newRef.key;
        localStorage.setItem('lastOrderId', currentOrderId);
        newRef.set({
            userEmail: currentUser.email,
            uid: currentUser.uid,
            pickup: document.getElementById('pickupLoc').value,
            dropoff: document.getElementById('dropoffLoc').value,
            harga: finalPrice.toFixed(2),
            status: "Menunggu Sahkan",
            masa: new Date().toLocaleString()
        });
        document.getElementById('bookingForm').classList.add('hidden');
        document.getElementById('statusArea').classList.remove('hidden');
        listenToStatus();
    }

    function listenToStatus() {
        database.ref('pesanan/' + currentOrderId).on('value', snap => {
            const d = snap.val();
            if(!d) return;
            const msg = document.getElementById('statusMsg');
            if(d.status === "Sila Bayar") {
                document.getElementById('paymentArea').classList.remove('hidden');
                msg.innerText = "Pemandu berminat! Sila bayar.";
                document.getElementById('waLink').href = `https://wa.me/60148495947?text=Resit RM${d.harga} dari ${currentUser.email}`;
            } else if(d.status === "Sedang Berjalan") {
                document.getElementById('paymentArea').classList.add('hidden');
                msg.style.background = "#27ae60"; msg.style.color = "white";
                msg.innerText = "Dalam perjalanan!";
            } else if(d.status === "Ditolak") {
                msg.innerText = "Maaf, pemandu sibuk. Sila cuba lagi.";
                setTimeout(() => resetApp(), 3000);
            } else if(d.status === "Selesai") {
                alert("Selesai!"); resetApp();
            }
        });
    }

    function checkExistingOrder() {
        document.getElementById('bookingForm').classList.add('hidden');
        document.getElementById('statusArea').classList.remove('hidden');
        listenToStatus();
    }

    function uploadedReceipt() {
        database.ref('pesanan/' + currentOrderId).update({ status: "Semak Resit" });
        alert("Pemandu akan semak resit anda.");
    }

    function resetApp() {
        localStorage.removeItem('lastOrderId');
        location.reload();
    }
</script>
</body>
</html>
