<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTransporter - Laluan & Harga</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .card { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; }
        
        #map { height: 350px; border-radius: 10px; margin-bottom: 15px; border: 2px solid #ddd; z-index: 1; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .readonly-input { background: #f9f9f9; color: #555; cursor: not-allowed; }
        
        .btn-gps { background: #3498db; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-order { background: #27ae60; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .price-box { background: #e8f0fe; padding: 15px; border-radius: 8px; text-align: center; margin-top: 10px; border: 1px solid #b3d7ff; }
        .distance-info { font-size: 14px; color: #555; margin-bottom: 5px; }
        
        /* Sembunyikan panel arahan teks Routing Machine supaya peta nampak bersih */
        .leaflet-routing-container { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚗 MyTransporter</h2>
    
    <input type="text" id="custName" placeholder="Nama Anda">
    <input type="tel" id="custPhone" placeholder="No. Telefon">

    <button class="btn-gps" onclick="getLocation()">📍 Gunakan Lokasi Semasa Saya</button>
    
    <div id="map"></div>

    <input type="text" id="pickupLoc" placeholder="Lokasi jemput..." readonly class="readonly-input">
    <input type="text" id="dropoffLoc" placeholder="Klik peta untuk destinasi..." readonly class="readonly-input">
    
    <select id="pax">
        <option value="1">1 Penumpang</option>
        <option value="2">2 Penumpang</option>
        <option value="3">3 Penumpang</option>
        <option value="4">4 Penumpang</option>
    </select>

    <div class="price-box">
        <div class="distance-info" id="distanceText">Jarak: 0 km</div>
        <span style="font-size: 14px; color: #666;">Jumlah Bayaran:</span>
        <h2 style="margin:0; color: #27ae60;" id="totalFare">RM 0.00</h2>
    </div>

    <button class="btn-order" onclick="submitOrder()">Tempah Sekarang</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    // Konfigurasi Firebase anda
    const firebaseConfig = {
      apiKey: "AIzaSyA9vK7iI1awExMkWxMFLtNDVlM4d1EM26o",
      authDomain: "mytransporter-687d9.firebaseapp.com",
      databaseURL: "https://mytransporter-687d9-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "mytransporter-687d9",
      storageBucket: "mytransporter-687d9.firebasestorage.app",
      messagingSenderId: "495656207465",
      appId: "1:495656207465:web:4d603fe3c77abadfe0cef8"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Inisialisasi Peta
    var map = L.map('map').setView([3.139, 101.686], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var pickupCoords = null;
    var dropoffCoords = null;
    var routingControl = null;
    var finalDistanceKm = 0;
    var finalFare = 0;

    // 1. Fungsi GPS untuk Pickup
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                pickupCoords = L.latLng(position.coords.latitude, position.coords.longitude);
                map.setView(pickupCoords, 15);
                updateRoute();
                getAddress(pickupCoords.lat, pickupCoords.lng, 'pickupLoc');
            }, () => alert("Sila aktifkan GPS!"));
        }
    }

    // 2. Klik Peta untuk Destinasi
    map.on('click', function(e) {
        dropoffCoords = e.latlng;
        updateRoute();
        getAddress(dropoffCoords.lat, dropoffCoords.lng, 'dropoffLoc');
    });

    // 3. Fungsi Utama: Lukis Laluan & Kira Harga
    function updateRoute() {
        if (!pickupCoords || !dropoffCoords) return;

        // Buang laluan lama jika ada
        if (routingControl) {
            map.removeControl(routingControl);
        }

        routingControl = L.Routing.control({
            waypoints: [pickupCoords, dropoffCoords],
            routeWhileDragging: false,
            addWaypoints: false,
            show: false, // Sembunyikan panel teks
            createMarker: function(i, wp) {
                return L.marker(wp.latLng, {
                    draggable: false,
                    icon: L.icon({
                        iconUrl: i === 0 ? 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png' : 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
                        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                        iconSize: [25, 41],
                        iconAnchor: [12, 41],
                        popupAnchor: [1, -34],
                        shadowSize: [41, 41]
                    })
                }).bindPopup(i === 0 ? "Jemput Di Sini" : "Hantar Di Sini");
            }
        }).on('routesfound', function(e) {
            var routes = e.routes;
            var summary = routes[0].summary;
            
            // Jarak dalam KM
            finalDistanceKm = summary.totalDistance / 1000;
            
            // Kira Harga: RM 2 per km, Min RM 10
            // Formula: $$Harga = \max(10, Jarak \times 2)$$
            finalFare = Math.max(10, finalDistanceKm * 2);

            document.getElementById('distanceText').innerText = `Jarak: ${finalDistanceKm.toFixed(2)} km`;
            document.getElementById('totalFare').innerText = `RM ${finalFare.toFixed(2)}`;
        }).addTo(map);
    }

    async function getAddress(lat, lon, elementId) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
            const data = await response.json();
            document.getElementById(elementId).value = data.display_name.substring(0, 50) + "...";
        } catch (e) {
            document.getElementById(elementId).value = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
        }
    }

    function submitOrder() {
        const name = document.getElementById('custName').value;
        const phone = document.getElementById('custPhone').value;

        if(!name || !pickupCoords || !dropoffCoords) {
            alert("Sila lengkapkan profil dan pilih lokasi pada peta!");
            return;
        }

        database.ref('pesanan').push({
            nama: name,
            phone: phone,
            pickup: document.getElementById('pickupLoc').value,
            dropoff: document.getElementById('dropoffLoc').value,
            jarak: finalDistanceKm.toFixed(2) + " km",
            harga: finalFare.toFixed(2),
            pax: document.getElementById('pax').value,
            status: "Menunggu Pemandu",
            masa: new Date().toLocaleString()
        }).then(() => {
            alert("Tempahan Berjaya! Pemandu akan segera hubungi anda.");
            location.reload();
        });
    }
</script>
</body>
</html>
