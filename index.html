<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTransporter - Peta Percuma</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .card { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; }
        
        #map { height: 300px; border-radius: 10px; margin-bottom: 15px; border: 2px solid #ddd; }
        
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; background: #fff; }
        .readonly-input { background: #eeeeee; cursor: not-allowed; }
        
        .btn-gps { background: #3498db; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-order { background: #27ae60; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .instruction { font-size: 12px; color: #666; text-align: center; margin-bottom: 10px; }
        .price-box { background: #e8f0fe; padding: 10px; border-radius: 8px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚗 MyTransporter</h2>
    
    <input type="text" id="custName" placeholder="Nama Anda">
    <input type="tel" id="custPhone" placeholder="No. Telefon (cth: 0148495947)">

    <div class="instruction">Klik butang di bawah untuk lokasi jemput, kemudian klik pada peta untuk destinasi.</div>
    
    <button class="btn-gps" onclick="getLocation()">📍 Gunakan Lokasi Semasa Saya</button>
    
    <div id="map"></div>

    <label>Lokasi Jemput:</label>
    <input type="text" id="pickupLoc" placeholder="Lokasi jemput..." readonly class="readonly-input">
    
    <label>Destinasi (Klik pada peta):</label>
    <input type="text" id="dropoffLoc" placeholder="Klik pada peta untuk pilih..." readonly class="readonly-input">
    
    <label>Bilangan Penumpang:</label>
    <select id="pax">
        <option value="1">1 Orang</option>
        <option value="2">2 Orang</option>
        <option value="3">3 Orang</option>
        <option value="4">4 Orang</option>
    </select>

    <div class="price-box">
        <span>Harga Tetap / Minimum:</span>
        <h2 style="margin:0">RM 10.00</h2>
    </div>

    <button class="btn-order" onclick="submitOrder()">Tempah Sekarang</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    // Konfigurasi Firebase anda
    const firebaseConfig = {
      apiKey: "AIzaSyA9vK7iI1awExMkWxMFLtNDVlM4d1EM26o",
      authDomain: "mytransporter-687d9.firebaseapp.com",
      databaseURL: "https://mytransporter-687d9-default-rtdb.asia-southeast1.firebasedatabase.app/",
      projectId: "mytransporter-687d9",
      storageBucket: "mytransporter-687d9.firebasestorage.app",
      messagingSenderId: "495656207465",
      appId: "1:495656207465:web:4d603fe3c77abadfe0cef8"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Inisialisasi Peta (Leaflet)
    var map = L.map('map').setView([3.139, 101.686], 13); // Default Kuala Lumpur
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    var pickupMarker, dropoffMarker;

    // Fungsi Kesan Lokasi Semasa (GPS)
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(showPosition, (err) => alert("Sila benarkan akses lokasi!"));
        } else {
            alert("Browser anda tidak menyokong GPS.");
        }
    }

    function showPosition(position) {
        var lat = position.coords.latitude;
        var lon = position.coords.longitude;
        map.setView([lat, lon], 16);

        if (pickupMarker) map.removeLayer(pickupMarker);
        pickupMarker = L.marker([lat, lon], {draggable: false}).addTo(map).bindPopup("Lokasi Jemput").openPopup();
        
        getAddress(lat, lon, 'pickupLoc');
    }

    // Fungsi Klik Peta untuk Pilih Destinasi
    map.on('click', function(e) {
        var lat = e.latlng.lat;
        var lon = e.latlng.lng;

        if (dropoffMarker) map.removeLayer(dropoffMarker);
        dropoffMarker = L.marker([lat, lon]).addTo(map).bindPopup("Destinasi").openPopup();
        
        getAddress(lat, lon, 'dropoffLoc');
    });

    // Fungsi Tukar Koordinat ke Alamat (Reverse Geocoding - Percuma)
    async function getAddress(lat, lon, elementId) {
        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
        const data = await response.json();
        document.getElementById(elementId).value = data.display_name;
    }

    function submitOrder() {
        const orderData = {
            nama: document.getElementById('custName').value,
            phone: document.getElementById('custPhone').value,
            pickup: document.getElementById('pickupLoc').value,
            dropoff: document.getElementById('dropoffLoc').value,
            pax: document.getElementById('pax').value,
            harga: "10.00",
            status: "Menunggu Pemandu",
            masa: new Date().toLocaleString()
        };

        if(!orderData.nama || !orderData.pickup || !orderData.dropoff) {
            alert("Sila lengkapkan nama dan pilih lokasi pada peta!");
            return;
        }

        database.ref('pesanan').push(orderData).then(() => {
            alert("Pesanan berjaya! Sila tunggu pemandu.");
            location.reload();
        });
    }
</script>
</body>
</html>
