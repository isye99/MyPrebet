<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTransporter - Pelanggan (Live Tracking)</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 15px; margin: 0; }
        .card { background: white; max-width: 500px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-top: 0; }
        
        /* Peta sentiasa kelihatan di tengah card */
        #map { height: 350px; width: 100%; border-radius: 10px; margin: 10px 0; border: 2px solid #ddd; z-index: 1; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .readonly-input { background: #f9f9f9; color: #555; cursor: not-allowed; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; text-align: center; box-sizing: border-box; }
        .btn-block { width: 100%; margin-top: 10px; padding: 15px; font-size: 16px; }
        
        .btn-gps { background: #3498db; color: white; width: 100%; }
        .btn-search { background: #34495e; color: white; width: 80px; margin: 8px 0; }
        .btn-order { background: #27ae60; color: white; }
        .btn-wa { background: #25D366; color: white; }
        .btn-confirm { background: #1a73e8; color: white; }

        .price-display { background: #e8f0fe; padding: 10px; border-radius: 8px; text-align: center; margin: 10px 0; border: 1px solid #b3d7ff; }
        .status-box { padding: 15px; border-radius: 10px; text-align: center; margin-top: 10px; font-weight: bold; font-size: 14px; border: 1px solid #ffeeba; background: #fff3cd; color: #856404; }
        .pay-now { background: #ffffff; border: 2px solid #28a745; margin-top: 15px; padding: 15px; border-radius: 10px; }
        .hidden { display: none !important; }
        .leaflet-routing-container { display: none !important; }
        
        .search-container { display: flex; gap: 5px; align-items: center; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚗 MyTransporter</h2>
    
    <div id="map"></div>

    <div id="bookingForm">
        <button class="btn btn-gps" onclick="getLocation()">📍 Kesan Lokasi Jemput Saya</button>
        
        <input type="text" id="custName" placeholder="Nama Anda">
        <input type="tel" id="custPhone" placeholder="No. Telefon">

        <label style="font-size: 11px; color: #666;">Lokasi Jemput:</label>
        <input type="text" id="pickupLoc" placeholder="Lokasi jemput..." readonly class="readonly-input">
        
        <label style="font-size: 11px; color: #666;">Cari Destinasi:</label>
        <div class="search-container">
            <input type="text" id="destSearch" placeholder="Taip tempat (cth: KLCC)">
            <button class="btn btn-search" onclick="searchDestination()">Cari</button>
        </div>
        <input type="text" id="dropoffLoc" placeholder="Alamat destinasi..." readonly class="readonly-input">
        
        <div class="price-display">
            <div id="distText" style="font-size:12px;">Jarak: 0 km</div>
            <h2 id="fareText" style="margin:0; color:#27ae60;">RM 0.00</h2>
        </div>

        <button class="btn btn-block btn-order" onclick="submitBooking()">Tempah Sekarang</button>
    </div>

    <div id="statusArea" class="hidden">
        <div id="statusMsg" class="status-box">Menunggu pemandu sahkan pesanan...</div>
        
        <div id="paymentArea" class="pay-now hidden">
            <h3 style="margin:0; font-size:16px;">Pemandu Sahkan! ✅</h3>
            <p style="font-size:13px;">Sila bayar <b>RM <span id="finalFare">0.00</span></b> ke:</p>
            <div style="background:#f1f1f1; padding:10px; border-radius:8px; font-family:monospace; font-size:13px;">
                <b>MAYBANK: 162263547890</b><br>Ahmad Transport
            </div>
            
            <a id="waLink" href="#" target="_blank" class="btn btn-block btn-wa">📲 Hantar Resit ke WhatsApp</a>
            <button class="btn btn-block btn-confirm" onclick="uploadedReceipt()">Saya Sudah Bayar</button>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA9vK7iI1awExMkWxMFLtNDVlM4d1EM26o",
        authDomain: "mytransporter-687d9.firebaseapp.com",
        databaseURL: "https://mytransporter-687d9-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "mytransporter-687d9",
        appId: "1:495656207465:web:4d603fe3c77abadfe0cef8"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentOrderId = localStorage.getItem('lastOrderId');
    let pickupCoords, dropoffCoords, routingControl, driverMarker;
    let pickupMarker, dropoffMarker;
    let finalPrice = 0;

    // Inisialisasi Peta
    var map = L.map('map').setView([3.139, 101.686], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);

    // Ikon Custom
    var blueIcon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41] });
    var redIcon = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png', shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png', iconSize: [25, 41], iconAnchor: [12, 41] });
    var carIcon = L.icon({ iconUrl: 'https://cdn-icons-png.flaticon.com/512/854/854838.png', iconSize: [35, 35], iconAnchor: [17, 17] });

    // Jika ada order aktif
    if (currentOrderId) {
        document.getElementById('bookingForm').classList.add('hidden');
        document.getElementById('statusArea').classList.remove('hidden');
        listenToStatus();
    }

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                pickupCoords = L.latLng(pos.coords.latitude, pos.coords.longitude);
                map.setView(pickupCoords, 16);
                if (pickupMarker) map.removeLayer(pickupMarker);
                pickupMarker = L.marker(pickupCoords, {icon: blueIcon}).addTo(map).bindPopup("Lokasi Jemput").openPopup();
                getAddress(pickupCoords.lat, pickupCoords.lng, 'pickupLoc');
                updateRoute();
            }, () => alert("Sila benarkan GPS!"));
        }
    }

    async function searchDestination() {
        const query = document.getElementById('destSearch').value;
        if (!query) return alert("Taip nama tempat!");
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}, Malaysia`);
            const data = await res.json();
            if (data.length > 0) {
                dropoffCoords = L.latLng(data[0].lat, data[0].lon);
                map.setView(dropoffCoords, 15);
                if (dropoffMarker) map.removeLayer(dropoffMarker);
                dropoffMarker = L.marker(dropoffCoords, {icon: redIcon}).addTo(map).bindPopup("Destinasi").openPopup();
                document.getElementById('dropoffLoc').value = data[0].display_name.substring(0, 50) + "...";
                updateRoute();
            } else { alert("Tempat tidak dijumpai."); }
        } catch (e) { alert("Ralat carian."); }
    }

    map.on('click', e => { 
        dropoffCoords = e.latlng; 
        if (dropoffMarker) map.removeLayer(dropoffMarker);
        dropoffMarker = L.marker(dropoffCoords, {icon: redIcon}).addTo(map).bindPopup("Destinasi").openPopup();
        getAddress(dropoffCoords.lat, dropoffCoords.lng, 'dropoffLoc');
        updateRoute(); 
    });

    async function getAddress(lat, lon, fieldId) {
        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
            const data = await response.json();
            document.getElementById(fieldId).value = (data.display_name || "Lokasi dikesan").substring(0, 50) + "...";
        } catch (e) { document.getElementById(fieldId).value = lat + "," + lon; }
    }

    function updateRoute() {
        if (!pickupCoords || !dropoffCoords) return;
        if (routingControl) map.removeControl(routingControl);
        routingControl = L.Routing.control({
            waypoints: [pickupCoords, dropoffCoords],
            show: false, addWaypoints: false,
            createMarker: function() { return null; }
        }).on('routesfound', e => {
            let dist = e.routes[0].summary.totalDistance / 1000;
            finalPrice = Math.max(10, dist * 2);
            document.getElementById('fareText').innerText = "RM " + finalPrice.toFixed(2);
        }).addTo(map);
    }

    function submitBooking() {
        const name = document.getElementById('custName').value;
        if(!name || !pickupCoords || !dropoffCoords) return alert("Sila lengkapkan maklumat!");
        const newRef = database.ref('pesanan').push();
        currentOrderId = newRef.key;
        localStorage.setItem('lastOrderId', currentOrderId);
        newRef.set({
            nama: name, phone: document.getElementById('custPhone').value,
            pickup: document.getElementById('pickupLoc').value, 
            dropoff: document.getElementById('dropoffLoc').value,
            harga: finalPrice.toFixed(2), status: "Menunggu Sahkan",
            masa: new Date().toLocaleString()
        }).then(() => {
            document.getElementById('bookingForm').classList.add('hidden');
            document.getElementById('statusArea').classList.remove('hidden');
            listenToStatus();
        });
    }

    function uploadedReceipt() {
        database.ref('pesanan/' + currentOrderId).update({ status: "Semak Resit" })
        .then(() => alert("Resit dihantar! Menunggu pengesahan."));
    }

    function listenToStatus() {
        database.ref('pesanan/' + currentOrderId).on('value', snap => {
            const data = snap.val();
            if(!data) return;

            // TRACKING KERETA PEMANDU (REALTIME)
            if(data.driver_lat && data.driver_lon) {
                let pos = [data.driver_lat, data.driver_lon];
                if(!driverMarker) {
                    driverMarker = L.marker(pos, {icon: carIcon}).addTo(map).bindPopup("Lokasi Pemandu");
                } else {
                    driverMarker.setLatLng(pos);
                }
                // Jika sedang berjalan, fokus peta kepada kereta
                if(data.status === "Sedang Berjalan") {
                    map.panTo(pos);
                }
            }

            const msgBox = document.getElementById('statusMsg');
            if(data.status === "Ditolak") {
                msgBox.style.background = "#e74c3c"; msgBox.style.color = "white";
                msgBox.innerHTML = `Pemandu menolak pesanan.<br><button onclick="resetApp()" style="margin-top:5px; padding:5px;">Tempah Semula</button>`;
            } else if(data.status === "Sila Bayar") {
                document.getElementById('paymentArea').classList.remove('hidden');
                document.getElementById('finalFare').innerText = data.harga;
                document.getElementById('waLink').href = `https://wa.me/60148495947?text=Resit RM${data.harga} dari ${data.nama}`;
                msgBox.innerText = "Pemandu sedia mengambil anda! Sila jelaskan bayaran.";
            } else if(data.status === "Sedang Berjalan") {
                document.getElementById('paymentArea').classList.add('hidden');
                msgBox.style.background = "#27ae60"; msgBox.style.color = "white";
                msgBox.innerText = "Pemandu sedang dalam perjalanan! Pantau lokasi kereta pada peta.";
            } else if(data.status === "Selesai") { 
                alert("Terima kasih! Sila beri rating."); 
                resetApp(); 
            }
        });
    }

    function resetApp() { localStorage.removeItem('lastOrderId'); location.reload(); }
</script>
</body>
</html>
