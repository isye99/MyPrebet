<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTransporter - Dashboard Pemandu</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 0; margin: 0; }
        
        /* LOGIN SCREEN STYLE */
        #loginScreen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #121212; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; 
        }
        .login-box { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        
        /* DASHBOARD STYLE */
        #dashboard { display: none; padding: 10px; }
        #map { height: 200px; width: 100%; border-radius: 10px; border: 1px solid #444; margin-bottom: 15px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid #f1c40f; }
        
        /* BUTTON STYLE */
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 8px; font-size: 14px; text-decoration: none; display: inline-block; text-align: center; box-sizing: border-box; }
        .btn-accept { background: #f1c40f; color: black; }
        .btn-reject { background: #e74c3c; color: white; }
        .btn-complete { background: #2ecc71; color: white; }
        .btn-nav { background: #3498db; color: white; font-size: 12px; }
        
        .nav-group { display: flex; gap: 5px; margin-top: 10px; }
        .nav-group .btn { flex: 1; margin-top: 0; }

        /* HISTORY TABLE */
        .history-section { margin-top: 20px; background: #1e1e1e; padding: 10px; border-radius: 12px; font-size: 11px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #333; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2 style="color:#f1c40f;">Pemandu Login</h2>
            <input type="text" id="adminID" placeholder="ID Pemandu">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn btn-accept" onclick="checkLogin()">Masuk Dashboard</button>
            <p id="loginError" style="color:#e74c3c; font-size:12px; margin-top:10px; display:none;">ID atau Password salah!</p>
        </div>
    </div>

    <div id="dashboard">
        <h2 style="text-align:center; color:#f1c40f;">🚖 MyTransporter Driver</h2>
        <div id="map"></div>
        
        <h3>Tugasan Aktif</h3>
        <div id="list">Memuatkan tugasan...</div>

        <div class="history-section">
            <h3 style="color:#f1c40f; margin:0;">📜 Sejarah & Pendapatan</h3>
            <p id="totalEarnings" style="color:#2ecc71; font-weight:bold;">Total: RM 0.00</p>
            <table>
                <thead><tr><th>Nama</th><th>Harga</th><th>Status</th></tr></thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
        <button class="btn" style="background:#444; color:white; margin-top:20px;" onclick="logout()">Log Keluar</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA9vK7iI1awExMkWxMFLtNDVlM4d1EM26o",
            authDomain: "mytransporter-687d9.firebaseapp.com",
            databaseURL: "https://mytransporter-687d9-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "mytransporter-687d9",
            appId: "1:495656207465:web:4d603fe3c77abadfe0cef8"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. FUNGSI LOGIN
        function checkLogin() {
            const id = document.getElementById('adminID').value;
            const pass = document.getElementById('adminPass').value;

            if(id === "adminpemandu" && pass === "80808080") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                initMap();
                loadData();
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        }

        function logout() { location.reload(); }

        // 2. SETUP MAP
        var map, watchId, currentMarker;
        function initMap() {
            map = L.map('map').setView([3.139, 101.686], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        // 3. LOAD DATA DARI FIREBASE
        function loadData() {
            database.ref('pesanan').on('value', snapshot => {
                const list = document.getElementById('list');
                const historyBody = document.getElementById('historyBody');
                list.innerHTML = "";
                historyBody.innerHTML = "";
                let totalIncome = 0;

                const data = snapshot.val();
                if(!data) return;

                Object.keys(data).reverse().forEach(id => {
                    const o = data[id];
                    if(o.status === "Selesai" || o.status === "Ditolak") {
                        if(o.status === "Selesai") totalIncome += parseFloat(o.harga);
                        historyBody.innerHTML += `<tr><td>${o.nama}</td><td>RM${o.harga}</td><td>${o.status}</td></tr>`;
                    } else {
                        renderActiveJob(id, o);
                    }
                });
                document.getElementById('totalEarnings').innerText = `Total: RM ${totalIncome.toFixed(2)}`;
            });
        }

        function renderActiveJob(id, o) {
            const list = document.getElementById('list');
            let btns = "";

            if(o.status === "Menunggu Sahkan") {
                btns = `
                    <button class="btn btn-accept" onclick="startTracking('${id}', 'Sila Bayar')">Terima Job</button>
                    <button class="btn btn-reject" onclick="updateStatus('${id}', 'Ditolak')">Tolak Job</button>
                `;
            } else {
                // BUTANG NAVIGASI GOOGLE MAPS & WAZE
                // Google Maps: https://www.google.com/maps/dir/?api=1&destination=ALAMAT
                // Waze: https://waze.com/ul?q=ALAMAT&navigate=yes
                const targetLoc = (o.status === "Sila Bayar" || o.status === "Semak Resit") ? o.pickup : o.dropoff;
                const navLabel = (o.status === "Sila Bayar" || o.status === "Semak Resit") ? "Ke Pickup" : "Ke Destinasi";

                btns = `
                    <div class="nav-group">
                        <a class="btn btn-nav" href="https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(targetLoc)}" target="_blank">Google Maps (${navLabel})</a>
                        <a class="btn btn-nav" href="https://waze.com/ul?q=${encodeURIComponent(targetLoc)}&navigate=yes" target="_blank" style="background:#33ccff;">Waze</a>
                    </div>
                `;

                if(o.status === "Semak Resit") {
                    btns += `<button class="btn btn-complete" onclick="updateStatus('${id}', 'Sedang Berjalan')">Sahkan Bayaran & Mula Jalan</button>`;
                } else if(o.status === "Sedang Berjalan") {
                    btns += `<button class="btn btn-complete" onclick="updateStatus('${id}', 'Selesai')">Selesai Penghantaran</button>`;
                }
            }

            list.innerHTML += `
                <div class="card">
                    <small>${o.status}</small><br>
                    <b>${o.nama}</b> (${o.phone})<br>
                    <small><b>Pickup:</b> ${o.pickup}</small><br>
                    <small><b>Dropoff:</b> ${o.dropoff}</small>
                    ${btns}
                </div>
            `;
        }

        // 4. FUNGSI GPS & STATUS
        function startTracking(id, status) {
            updateStatus(id, status);
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(pos => {
                    let lat = pos.coords.latitude, lon = pos.coords.longitude;
                    database.ref('pesanan/' + id).update({ driver_lat: lat, driver_lon: lon });
                    map.setView([lat, lon], 15);
                    if(!currentMarker) currentMarker = L.marker([lat, lon]).addTo(map);
                    else currentMarker.setLatLng([lat, lon]);
                }, null, { enableHighAccuracy: true });
            }
        }

        function updateStatus(id, s) {
            database.ref('pesanan/' + id).update({ status: s });
            if((s === "Selesai" || s === "Ditolak") && watchId) navigator.geolocation.clearWatch(watchId);
        }
    </script>
</body>
</html>
