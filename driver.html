<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTransporter - Dashboard Pemandu</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 10px; margin: 0; }
        #map { height: 250px; width: 100%; border-radius: 10px; border: 1px solid #444; margin-bottom: 15px; }
        
        /* Kad Tugasan Aktif */
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid #f1c40f; }
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 8px; font-size: 14px; }
        .btn-accept { background: #f1c40f; color: black; }
        .btn-reject { background: #e74c3c; color: white; }
        .btn-complete { background: #2ecc71; color: white; }

        /* SEKSYEN SEJARAH (TABLE) */
        .history-section { margin-top: 30px; background: #1e1e1e; padding: 15px; border-radius: 12px; border: 1px solid #333; }
        .history-title { color: #f1c40f; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #333; }
        th { color: #888; text-transform: uppercase; }
        .status-done { color: #2ecc71; font-weight: bold; }
        .status-rejected { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="text-align:center; color:#f1c40f;">🚖 Dashboard Pemandu</h2>
    <div id="map"></div>
    
    <h3 style="color:#f1c40f; margin-left:5px;">Tugasan Aktif</h3>
    <div id="list">Memuatkan tugasan...</div>

    <div class="history-section">
        <div class="history-title">
            <span>📜 Sejarah Pesanan</span>
            <span id="totalEarnings" style="font-size:14px; color:#2ecc71;">Total: RM 0.00</span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Pelanggan</th>
                    <th>Harga</th>
                    <th>Status</th>
                    <th>Tarikh/Masa</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                </tbody>
        </table>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA9vK7iI1awExMkWxMFLtNDVlM4d1EM26o",
            authDomain: "mytransporter-687d9.firebaseapp.com",
            databaseURL: "https://mytransporter-687d9-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "mytransporter-687d9",
            appId: "1:495656207465:web:4d603fe3c77abadfe0cef8"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        var map = L.map('map').setView([3.139, 101.686], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var watchId, currentMarker;

        database.ref('pesanan').on('value', snapshot => {
            const list = document.getElementById('list');
            const historyBody = document.getElementById('historyBody');
            
            list.innerHTML = "";
            historyBody.innerHTML = "";
            
            const data = snapshot.val();
            let totalIncome = 0;

            if(!data) {
                list.innerHTML = "<p style='color:#666; padding-left:10px;'>Tiada tugasan.</p>";
                historyBody.innerHTML = "<tr><td colspan='4' style='text-align:center; color:#666;'>Tiada rekod.</td></tr>";
                return;
            }

            Object.keys(data).reverse().forEach(id => {
                const o = data[id];

                // --- LOGIK JADUAL SEJARAH ---
                if(o.status === "Selesai" || o.status === "Ditolak") {
                    let sClass = o.status === "Selesai" ? "status-done" : "status-rejected";
                    if(o.status === "Selesai") totalIncome += parseFloat(o.harga || 0);

                    historyBody.innerHTML += `
                        <tr>
                            <td><b>${o.nama}</b></td>
                            <td>RM${o.harga}</td>
                            <td class="${sClass}">${o.status}</td>
                            <td style="color:#666; font-size:10px;">${o.masa || '-'}</td>
                        </tr>
                    `;
                } 
                // --- LOGIK KAD TUGASAN AKTIF ---
                else {
                    let btn = "";
                    if(o.status === "Menunggu Sahkan") {
                        btn = `
                            <button class="btn btn-accept" onclick="startTracking('${id}', 'Sila Bayar')">Terima Job</button>
                            <button class="btn btn-reject" onclick="updateStatus('${id}', 'Ditolak')">Tolak Job</button>
                        `;
                    } else if(o.status === "Semak Resit") {
                        btn = `<button class="btn btn-complete" onclick="updateStatus('${id}', 'Sedang Berjalan')">Sahkan Bayaran & Jalan</button>`;
                    } else if(o.status === "Sedang Berjalan") {
                        btn = `<button class="btn btn-complete" onclick="updateStatus('${id}', 'Selesai')">Selesai Hantar</button>`;
                    }

                    list.innerHTML += `
                        <div class="card">
                            <small style="color:#aaa">${o.status}</small><br>
                            <b>${o.nama}</b><br>
                            <small>Ke: ${o.dropoff}</small><br>
                            <span style="color:#2ecc71">RM${o.harga}</span>
                            ${btn}
                        </div>
                    `;
                }
            });

            document.getElementById('totalEarnings').innerText = `Total: RM ${totalIncome.toFixed(2)}`;
        });

        function updateStatus(id, s) {
            database.ref('pesanan/' + id).update({ status: s });
            if((s === "Selesai" || s === "Ditolak") && watchId) navigator.geolocation.clearWatch(watchId);
        }

        function startTracking(id, status) {
            updateStatus(id, status);
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(pos => {
                    let lat = pos.coords.latitude, lon = pos.coords.longitude;
                    database.ref('pesanan/' + id).update({ driver_lat: lat, driver_lon: lon });
                    map.setView([lat, lon], 15);
                    if(!currentMarker) currentMarker = L.marker([lat, lon]).addTo(map);
                    else currentMarker.setLatLng([lat, lon]);
                }, null, { enableHighAccuracy: true });
            }
        }
    </script>
</body>
</html>
