<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTransporter - Dashboard Pemandu</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 0; margin: 0; }
        
        /* LOGIN SCREEN */
        #loginScreen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #121212; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 9999; 
        }
        .login-box { background: #1e1e1e; padding: 30px; border-radius: 15px; width: 85%; max-width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #222; color: white; box-sizing: border-box; }
        
        /* DASHBOARD CONTENT */
        #dashboard { display: none; padding: 10px; }
        #map { height: 250px; width: 100%; border-radius: 12px; border: 1px solid #444; margin-bottom: 15px; }
        
        /* CARDS */
        .card { background: #1e1e1e; padding: 15px; border-radius: 12px; margin-bottom: 12px; border-left: 5px solid #f1c40f; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .card h4 { margin: 0 0 10px 0; color: #f1c40f; font-size: 18px; }
        .info-text { font-size: 13px; color: #ccc; margin: 3px 0; }
        
        /* BUTTONS */
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 14px; text-decoration: none; display: inline-block; text-align: center; box-sizing: border-box; transition: 0.3s; }
        .btn-accept { background: #f1c40f; color: black; }
        .btn-reject { background: #e74c3c; color: white; }
        .btn-complete { background: #2ecc71; color: white; }
        .btn-nav { background: #3498db; color: white; font-size: 12px; }
        
        .nav-group { display: flex; gap: 8px; margin-top: 10px; }
        .nav-group .btn { flex: 1; margin-top: 0; }

        /* HISTORY TABLE */
        .history-section { margin-top: 30px; background: #1e1e1e; padding: 15px; border-radius: 12px; }
        .history-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #222; }
        th { color: #888; text-transform: uppercase; font-size: 10px; }
        
        .income-text { color: #2ecc71; font-weight: bold; font-size: 16px; }
        .status-done { color: #2ecc71; }
        .status-rejected { color: #e74c3c; }
    </style>
</head>
<body>

    <div id="loginScreen">
        <div class="login-box">
            <h2 style="color:#f1c40f; margin-top:0;">MyTransporter</h2>
            <p style="color:#888; font-size:13px;">Sila Log Masuk Pemandu</p>
            <input type="email" id="adminID" placeholder="Emel (adminpemandu@gmail.com)">
            <input type="password" id="adminPass" placeholder="Password">
            <button class="btn btn-accept" onclick="checkLogin()">MASUK DASHBOARD</button>
            <p id="loginError" style="color:#e74c3c; font-size:12px; margin-top:10px; display:none;"></p>
        </div>
    </div>

    <div id="dashboard">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:#f1c40f;">🚖 Dashboard</h2>
            <button onclick="logout()" style="background:none; border:1px solid #444; color:#888; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:11px;">Log Keluar</button>
        </div>

        <div id="map"></div>
        
        <h3 style="margin: 15px 0 10px 5px; color:#f1c40f;">Tugasan Aktif</h3>
        <div id="list">Memuatkan tugasan...</div>

        <div class="history-section">
            <div class="history-header">
                <h3 style="margin:0; color:#f1c40f;">📜 Sejarah</h3>
                <div id="totalEarnings" class="income-text">RM 0.00</div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Pelanggan</th>
                        <th>Harga</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // 1. Konfigurasi Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA9vK7iI1awExMkWxMFLtNDVlM4d1EM26o",
            authDomain: "mytransporter-687d9.firebaseapp.com",
            databaseURL: "https://mytransporter-687d9-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "mytransporter-687d9",
            appId: "1:495656207465:web:4d603fe3c77abadfe0cef8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        // 2. Logik Login & Auth
        function checkLogin() {
            const email = document.getElementById('adminID').value;
            const pass = document.getElementById('adminPass').value;
            const errorMsg = document.getElementById('loginError');

            auth.signInWithEmailAndPassword(email, pass)
                .catch(error => {
                    errorMsg.innerText = "Ralat: " + error.message;
                    errorMsg.style.display = 'block';
                });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                initMap();
                loadData();
            } else {
                document.getElementById('loginScreen').style.display = 'flex';
                document.getElementById('dashboard').style.display = 'none';
            }
        });

        function logout() { auth.signOut(); }

        // 3. Setup Peta
        var map, watchId, currentMarker;
        function initMap() {
            if(map) return;
            map = L.map('map').setView([3.139, 101.686], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        // 4. Load & Papar Data
        function loadData() {
            database.ref('pesanan').on('value', snapshot => {
                const list = document.getElementById('list');
                const historyBody = document.getElementById('historyBody');
                list.innerHTML = "";
                historyBody.innerHTML = "";
                let totalIncome = 0;

                const data = snapshot.val();
                if(!data) {
                    list.innerHTML = "<p style='color:#666; font-size:13px;'>Tiada tugasan baru.</p>";
                    return;
                }

                Object.keys(data).reverse().forEach(id => {
                    const o = data[id];
                    
                    if(o.status === "Selesai" || o.status === "Ditolak") {
                        // Masuk Sejarah
                        if(o.status === "Selesai") totalIncome += parseFloat(o.harga || 0);
                        const sClass = o.status === "Selesai" ? "status-done" : "status-rejected";
                        historyBody.innerHTML += `<tr><td>${o.nama}</td><td>RM${o.harga}</td><td class="${sClass}">${o.status}</td></tr>`;
                    } else {
                        // Masuk Kad Aktif
                        renderActiveCard(id, o);
                    }
                });
                document.getElementById('totalEarnings').innerText = `Total: RM ${totalIncome.toFixed(2)}`;
            });
        }

        function renderActiveCard(id, o) {
            const list = document.getElementById('list');
            let actions = "";

            if(o.status === "Menunggu Sahkan") {
                actions = `
                    <button class="btn btn-accept" onclick="startJob('${id}', 'Sila Bayar')">Terima Job</button>
                    <button class="btn btn-reject" onclick="updateStatus('${id}', 'Ditolak')">Tolak Job</button>
                `;
            } else {
                // Tentukan alamat untuk butang navigasi
                const targetLoc = (o.status === "Sila Bayar" || o.status === "Semak Resit") ? o.pickup : o.dropoff;
                const targetLabel = (o.status === "Sila Bayar" || o.status === "Semak Resit") ? "Pickup" : "Destinasi";
                
                actions = `
                    <div class="nav-group">
                        <a class="btn btn-nav" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(targetLoc)}" target="_blank">Google Maps</a>
                        <a class="btn btn-nav" href="https://waze.com/ul?q=${encodeURIComponent(targetLoc)}&navigate=yes" target="_blank" style="background:#33ccff;">Waze</a>
                    </div>
                `;

                if(o.status === "Semak Resit") {
                    actions += `<button class="btn btn-complete" onclick="updateStatus('${id}', 'Sedang Berjalan')">Sahkan Bayaran & Gerak</button>`;
                } else if(o.status === "Sedang Berjalan") {
                    actions += `<button class="btn btn-complete" onclick="updateStatus('${id}', 'Selesai')">Selesai / Sampai Destinasi</button>`;
                }
            }

            list.innerHTML += `
                <div class="card">
                    <span style="font-size:10px; color:#f1c40f; text-transform:uppercase;">${o.status}</span>
                    <h4>${o.nama}</h4>
                    <p class="info-text">📍 <b>Dari:</b> ${o.pickup}</p>
                    <p class="info-text">🏁 <b>Ke:</b> ${o.dropoff}</p>
                    <p class="info-text" style="color:#2ecc71; font-weight:bold; font-size:15px; margin-top:5px;">RM ${o.harga}</p>
                    ${actions}
                </div>
            `;
        }

        // 5. GPS & Kemaskini Status
        function startJob(id, status) {
            updateStatus(id, status);
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(pos => {
                    let lat = pos.coords.latitude, lon = pos.coords.longitude;
                    database.ref('pesanan/' + id).update({ driver_lat: lat, driver_lon: lon });
                    map.setView([lat, lon], 15);
                    if(!currentMarker) currentMarker = L.marker([lat, lon]).addTo(map).bindPopup("Saya Di Sini").openPopup();
                    else currentMarker.setLatLng([lat, lon]);
                }, null, { enableHighAccuracy: true });
            }
        }

        function updateStatus(id, s) {
            database.ref('pesanan/' + id).update({ status: s });
            if((s === "Selesai" || s === "Ditolak") && watchId) navigator.geolocation.clearWatch(watchId);
        }
    </script>
</body>
</html>
