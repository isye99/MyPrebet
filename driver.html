<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pemandu</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 15px; }
        .card { background: #1e1e1e; padding: 15px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #f1c40f; }
        .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-accept { background: #f1c40f; color: black; }
        .btn-verify { background: #2ecc71; color: white; }
    </style>
</head>
<body>

    <h2>🚖 MyTransporter Driver</h2>
    <div id="list">Memuatkan...</div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyA9vK7iI1awExMkWxMFLtNDVlM4d1EM26o",
          authDomain: "mytransporter-687d9.firebaseapp.com",
          databaseURL: "https://mytransporter-687d9-default-rtdb.asia-southeast1.firebasedatabase.app/",
          projectId: "mytransporter-687d9",
          appId: "1:495656207465:web:4d603fe3c77abadfe0cef8"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('pesanan').on('value', snapshot => {
            const list = document.getElementById('list');
            list.innerHTML = "";
            const data = snapshot.val();
            if(!data) { list.innerHTML = "Tiada job."; return; }

            Object.keys(data).reverse().forEach(id => {
                const o = data[id];
                if(o.status === "Selesai") return;

                let actionBtn = "";
                if(o.status === "Menunggu Sahkan") {
                    actionBtn = `<button class="btn btn-accept" onclick="updateStatus('${id}', 'Sila Bayar')">Terima Job & Minta Bayaran</button>`;
                } else if(o.status === "Semak Resit") {
                    actionBtn = `<p style="color:#2ecc71">Pelanggan kata dah bayar. Semak bank anda!</p>
                                 <button class="btn btn-verify" onclick="updateStatus('${id}', 'Sedang Berjalan')">Sahkan Duit Dah Masuk</button>`;
                }

                list.innerHTML += `
                    <div class="card">
                        <p><b>Status: ${o.status}</b></p>
                        <p>Pelanggan: ${o.nama} (${o.phone})</p>
                        <p>Destinasi: ${o.dropoff}</p>
                        ${actionBtn}
                    </div>
                `;
            });
        });

        function updateStatus(id, s) {
            database.ref('pesanan/' + id).update({ status: s });
        }
    </script>
</body>
</html>
