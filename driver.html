<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemandu MyTransporter</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; padding: 15px; }
        .order-card { background: #1e1e1e; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .status-waiting { color: #f1c40f; font-weight: bold; margin-bottom: 10px; display: block; }
        .btn-accept { background: #f1c40f; color: black; border: none; padding: 12px; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; }
        .btn-complete { background: #2ecc71; color: white; border: none; padding: 12px; border-radius: 5px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: bold; }
        .info { margin: 8px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .label { color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #f1c40f;">🚖 Dashboard Pemandu</h2>
    <div id="order-list">Memuatkan pesanan...</div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyA9vK7iI1awExMkWxMFLtNDVlM4d1EM26o",
          authDomain: "mytransporter-687d9.firebaseapp.com",
          databaseURL: "https://mytransporter-687d9-default-rtdb.asia-southeast1.firebasedatabase.app/",
          projectId: "mytransporter-687d9",
          storageBucket: "mytransporter-687d9.firebasestorage.app",
          messagingSenderId: "495656207465",
          appId: "1:495656207465:web:4d603fe3c77abadfe0cef8"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('pesanan').on('value', (snapshot) => {
            const list = document.getElementById('order-list');
            list.innerHTML = "";
            const data = snapshot.val();
            
            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const o = data[key];
                    if(o.status !== "Selesai") {
                        list.innerHTML += `
                            <div class="order-card">
                                <span class="status-waiting">● ${o.status}</span>
                                <div class="info"><span class="label">PELANGGAN:</span><br><b>${o.nama}</b> (<a href="tel:${o.phone}" style="color: #3498db;">${o.phone}</a>)</div>
                                <div class="info"><span class="label">JEMPUT:</span><br>${o.pickup}</div>
                                <div class="info"><span class="label">HANTAR:</span><br>${o.dropoff}</div>
                                <div class="info" style="color: #2ecc71;"><b>TAMBANG: RM ${o.harga}</b> (Pax: ${o.pax})</div>
                                
                                <button class="btn-accept" onclick="updateStatus('${key}', 'Pemandu Sedang Datang')">Terima Tugasan</button>
                                <button class="btn-complete" onclick="updateStatus('${key}', 'Selesai')">Set Selesai / Dah Sampai</button>
                            </div>
                        `;
                    }
                });
            } else {
                list.innerHTML = "<p style='text-align:center; color:#666;'>Tiada pesanan aktif buat masa ini.</p>";
            }
        });

        function updateStatus(id, s) {
            database.ref('pesanan/' + id).update({ status: s });
        }
    </script>
</body>
</html>
